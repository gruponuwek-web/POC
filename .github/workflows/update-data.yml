name: Actualizar datos desde Google Sheets

on:
  schedule:
    # Cada 20 min, 7 AM – 7 PM hora México (UTC-6 → 13:00–01:00 UTC), lunes a viernes
    - cron: '*/20 13-23,0,1 * * 1-5'
  workflow_dispatch: # También permite correrlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Crear archivo de credenciales
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > "datos poc/credentials.json"

      - name: Ejecutar ETL (Google Sheets → JSON)
        run: node "datos poc/process_data.js"

      - name: Verificar si hubo cambios
        id: changes
        run: |
          git diff --quiet src/data/dashboard_data.json public/data/dashboard_data.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Build para GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Commit y push si hay datos nuevos
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/dashboard_data.json public/data/dashboard_data.json docs/data/dashboard_data.json docs/assets/
          git commit -m "data: actualización automática $(date +'%Y-%m-%d %H:%M') UTC"
          git push
